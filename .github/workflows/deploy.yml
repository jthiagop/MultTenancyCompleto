name: Deploy — Dominus Sistema

on:
  push:
    branches:
      - main          # dispara automaticamente ao fazer push para main
  workflow_dispatch:  # permite disparar manualmente pelo painel do GitHub

jobs:
  deploy:
    name: Deploy para VPS
    runs-on: ubuntu-latest

    steps:
      # ── 1. Conecta na VPS via SSH e executa o deploy.sh ──────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            echo "→ Conectado em $(hostname) como $(whoami)"
            cd /var/www/html/MultTenancyCompleto
            bash deploy.sh main 2>&1

      # ── 2. Notificação de sucesso (opcional) ────────────────────────────
      - name: Notificar sucesso
        if: success()
        run: echo "✅ Deploy concluído com sucesso para ${{ github.ref_name }}"

      # ── 3. Notificação de falha (opcional) ──────────────────────────────
      - name: Notificar falha
        if: failure()
        run: echo "❌ Deploy FALHOU. Verifique os logs acima."
