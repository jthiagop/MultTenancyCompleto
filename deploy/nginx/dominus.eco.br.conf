# ---------------------------------------------------------------
# Dominus Eclesial — vhost multi-tenant (*.dominus.eco.br)
#
# Arquivo versionado no repositório:
#   deploy/nginx/dominus.eco.br.conf
#
# Instalação no servidor (uma vez):
#   sudo ln -sf /var/www/html/MultTenancyCompleto/deploy/nginx/dominus.eco.br.conf \
#               /etc/nginx/sites-available/dominus.eco.br
#   sudo ln -sf /etc/nginx/sites-available/dominus.eco.br \
#               /etc/nginx/sites-enabled/dominus.eco.br
#   sudo nginx -t && sudo systemctl reload nginx
#
# Para aplicar alterações depois de editar este arquivo:
#   sudo nginx -t && sudo systemctl reload nginx
# ---------------------------------------------------------------

# Redireciona HTTP -> HTTPS (tráfego direto; Cloudflare também força https)
server {
    listen 80;
    listen [::]:80;
    server_name dominus.eco.br *.dominus.eco.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dominus.eco.br *.dominus.eco.br;

    root  /var/www/html/MultTenancyCompleto/public;
    index index.php index.html index.htm;

    # Cloudflare Origin Certificate (pinned ao Cloudflare — tráfego direto vai falhar)
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Segurança de cabeçalhos
    # HSTS: 6 meses + subdomínios. Sem `preload` por enquanto (só adicionar após submeter ao HSTS preload list).
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;
    add_header X-Content-Type-Options   "nosniff" always;
    add_header X-Frame-Options          "SAMEORIGIN" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # Uploads: OFX, anexos, imagens de tela de login etc. (php.ini aceita, nginx também precisa)
    client_max_body_size 50M;
    client_body_timeout  60s;

    # Compressão gzip (brotli não disponível neste build do nginx Ubuntu)
    gzip               on;
    gzip_vary          on;
    gzip_comp_level    5;
    gzip_min_length    1024;
    gzip_proxied       any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/rss+xml
        application/atom+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # Logs (separados dos default para facilitar tail)
    error_log  /var/log/nginx/dominus_error.log;
    access_log /var/log/nginx/dominus_access.log;

    # --------------------------------------------------------------
    # Assets com hash do Vite — seguros para cache imutável
    # --------------------------------------------------------------

    # Bundle React (resources/js/react -> public/react-app/assets/*)
    location ^~ /react-app/assets/ {
        access_log off;
        expires    1y;
        add_header Cache-Control "public, immutable" always;
        try_files  $uri =404;
    }

    # Bundle Laravel raiz (npm run build -> public/build/*)
    location ^~ /build/ {
        access_log off;
        expires    1y;
        add_header Cache-Control "public, immutable" always;
        try_files  $uri =404;
    }

    # Media estática do tema Metronic (tenancy/assets) — cache moderado (sem hash no filename)
    location ~* ^/tenancy/assets/.+\.(?:css|js|png|jpe?g|gif|svg|ico|webp|woff2?|ttf|eot)$ {
        access_log off;
        expires    7d;
        add_header Cache-Control "public" always;
        try_files  $uri =404;
    }

    # --------------------------------------------------------------
    # Rota padrão Laravel
    # --------------------------------------------------------------

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock; # PHP 8.4 (deps do projeto)
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Relatórios, exportações e processamento de OFX podem passar dos 60s default
        fastcgi_read_timeout    180s;
        fastcgi_connect_timeout 10s;
        fastcgi_send_timeout    60s;

        # Buffers para respostas grandes (relatórios, JSON de appData em tenants com muitos módulos)
        fastcgi_buffers      16 32k;
        fastcgi_buffer_size  64k;
    }

    # Bloqueia dotfiles (exceto /.well-known usado por ACME/LE)
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
